# wrangler.toml — Cloudflare Worker config for the Rapido quote tool.
#
# Deploy:   npx wrangler deploy
# Secret:   npx wrangler secret put MONDAY_TOKEN     (never commit the token)
# Dev:      npx wrangler dev
#
# The [vars] below are NON-secret config. Fill the placeholders with the real
# values from Bruno (Monday IDs) and LC (the live Rapido domain), then deploy.

# Worker name must match the Cloudflare Workers Build connected to this repo.
name = "quotecalculatorrapido"
main = "src/worker.js"
compatibility_date = "2025-01-01"

# Import the front-end widget (elementor/widget.client.txt) as a string so the
# Worker can serve it at GET /widget.js. The .txt extension avoids colliding
# with the default JS/ESM module rules.
[[rules]]
type = "Text"
globs = ["**/*.txt"]

# ---------------------------------------------------------------------------
# Non-secret configuration (safe to commit). Replace every <PLACEHOLDER>.
# ---------------------------------------------------------------------------
[vars]
# CORS — lock to Rapido's live origin(s). Comma-separated if more than one.
ALLOWED_ORIGIN = "https://servicerapido.com,https://www.servicerapido.com"

# Basic per-IP rate limit (abuse guard). Tune after watching real traffic.
RATE_LIMIT_WINDOW_MS = "60000"
RATE_LIMIT_MAX = "8"

# --- Monday.com board: "New Leads Automatic Quote BETA" ---
# https://grouperapido.monday.com/boards/18419200008
MONDAY_BOARD_ID = "18419200008"
# "topics" = the top group "Nouveau Leads". Empty would also default here.
MONDAY_GROUP_ID = "topics"

# --- Monday.com column IDs (mapped to this board) ---
# Contact fields map to their real columns; size/movers/distance/total have no
# dedicated columns on this board, so the full quote breakdown is written to the
# "Détails / Projet" long-text column instead. The customer NAME is the item
# title (item_name) and is also mirrored to "Nom du client".
MONDAY_COL_PHONE        = "phone_mm2m8m7s"     # Téléphone (phone)
MONDAY_COL_EMAIL        = "email_mm2m1mmg"     # Adresse Courriel (email)
MONDAY_COL_CLIENT_NAME  = "text_mm2m4rx1"      # Nom du client (text)
MONDAY_COL_ORIGIN       = "text_mm2m31jw"      # Adresse de Départ (Extract) (text)
MONDAY_COL_DEST         = "text_mm2mxbds"      # Adresse de Destination (Extract) (text)
MONDAY_COL_SERVICE      = "color_mm2msnf5"     # Service (status)
MONDAY_COL_PROVENANCE   = "color_mm2m5yvt"     # Provenance (status)
MONDAY_COL_SERVICE_DATE = "date_mm2mzac7"      # Date de service (date) = moving date
MONDAY_COL_CONTACT_DATE = "date_mm2mjfdg"      # Date contact (date) = submission date
MONDAY_COL_DETAILS      = "long_text_mm2m85we" # Détails / Projet (long_text) = full quote
# Addresses use the text "(Extract)" columns. The location-pin columns
# (location_mm2m9m5y / location_mm2m5srv) need lat/lng from a maps API — a
# later upgrade per SPEC §6.

# ---------------------------------------------------------------------------
# Secret (do NOT put in this file). Set it once with:
#   npx wrangler secret put MONDAY_TOKEN
# ---------------------------------------------------------------------------
